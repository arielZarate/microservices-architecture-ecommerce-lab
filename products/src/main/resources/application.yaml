server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: products

  datasource:
    url: jdbc:postgresql://localhost:5432/products_management
    username: postgres
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
